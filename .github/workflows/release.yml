name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: macOS (universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos

      # --- main binary (per-arch for mise compatibility) ---
      - name: Build ir (aarch64)
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        run: cargo build --release --target aarch64-apple-darwin --bin ir

      - name: Build ir (x86_64)
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.15'
        run: cargo build --release --target x86_64-apple-darwin --bin ir

      - name: Package ir
        run: |
          tar -czf ir-darwin-aarch64.tar.gz -C target/aarch64-apple-darwin/release ir
          tar -czf ir-darwin-x86_64.tar.gz  -C target/x86_64-apple-darwin/release  ir

      # --- preprocessors (universal binary via lipo, matches existing release format) ---
      - name: Build & package preprocessors
        run: |
          for entry in \
            "preprocessors/ko/lindera-tokenize:lindera-tokenize" \
            "preprocessors/ja/lindera-tokenize:lindera-tokenize-ja" \
            "preprocessors/zh/bigram-tokenize:bigram-tokenize-zh"
          do
            dir="${entry%%:*}"
            bin="${entry##*:}"

            MACOSX_DEPLOYMENT_TARGET=11.0 \
              cargo build --release --target aarch64-apple-darwin \
                --manifest-path "$dir/Cargo.toml"
            MACOSX_DEPLOYMENT_TARGET=10.15 \
              cargo build --release --target x86_64-apple-darwin \
                --manifest-path "$dir/Cargo.toml"

            lipo -create -output "$bin" \
              "$dir/target/aarch64-apple-darwin/release/$bin" \
              "$dir/target/x86_64-apple-darwin/release/$bin"

            tar -czf "${bin}-darwin-universal.tar.gz" "$bin"
            rm -f "$bin"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: '*.tar.gz'

  build-linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-x86_64

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake musl-tools

      - name: Build ir
        run: |
          cargo build --release --bin ir \
            --no-default-features --features llama-openmp

      - name: Package ir
        run: tar -czf ir-linux-x86_64.tar.gz -C target/release ir

      - name: Build & package preprocessors
        run: |
          for entry in \
            "preprocessors/ko/lindera-tokenize:lindera-tokenize" \
            "preprocessors/ja/lindera-tokenize:lindera-tokenize-ja" \
            "preprocessors/zh/bigram-tokenize:bigram-tokenize-zh"
          do
            dir="${entry%%:*}"
            bin="${entry##*:}"
            cargo build --release --target x86_64-unknown-linux-musl \
              --manifest-path "$dir/Cargo.toml"
            tar -czf "${bin}-linux-x86_64.tar.gz" \
              -C "$dir/target/x86_64-unknown-linux-musl/release" "$bin"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: '*.tar.gz'

  build-linux-aarch64:
    name: Linux aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-aarch64

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake musl-tools

      - name: Build ir
        run: |
          cargo build --release --bin ir \
            --no-default-features --features llama-openmp

      - name: Package ir
        run: tar -czf ir-linux-aarch64.tar.gz -C target/release ir

      - name: Build & package preprocessors
        run: |
          for entry in \
            "preprocessors/ko/lindera-tokenize:lindera-tokenize" \
            "preprocessors/ja/lindera-tokenize:lindera-tokenize-ja" \
            "preprocessors/zh/bigram-tokenize:bigram-tokenize-zh"
          do
            dir="${entry%%:*}"
            bin="${entry##*:}"
            cargo build --release --target aarch64-unknown-linux-musl \
              --manifest-path "$dir/Cargo.toml"
            tar -czf "${bin}-linux-aarch64.tar.gz" \
              -C "$dir/target/aarch64-unknown-linux-musl/release" "$bin"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: '*.tar.gz'

  release:
    name: Release
    needs: [build-macos, build-linux-x86_64, build-linux-aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum *.tar.gz | sort > SHA256SUMS

      - name: List release assets
        run: ls -lh *.tar.gz SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            SHA256SUMS
