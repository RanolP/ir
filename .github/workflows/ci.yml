name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-shear
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --no-default-features --features llama-openmp

      - name: Test
        run: cargo test --no-default-features --features llama-openmp

      - name: Clippy
        run: cargo clippy --no-default-features --features llama-openmp --no-deps -- -D warnings

      - name: Format
        run: cargo fmt -- --check

      - name: Unused dependencies
        run: cargo shear
