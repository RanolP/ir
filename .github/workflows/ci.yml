name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: taiki-e/install-action@040bb48b5cd84a37ab6c39ef3d4673efb5fdcf02 # cargo-shear
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build
        run: cargo build --no-default-features --features llama-openmp

      - name: Test
        run: cargo test --no-default-features --features llama-openmp

      - name: Clippy
        run: cargo clippy --no-default-features --features llama-openmp --no-deps -- -D warnings

      - name: Format
        run: cargo fmt -- --check

      - name: Unused dependencies
        run: cargo shear
